name: Build Five Scorer APK

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

permissions:
  contents: write   # needed to publish a release

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true
          packages: |
            platform-tools
            platforms;android-35
            build-tools;35.0.0

      - name: Install Node deps
        run: npm install --no-audit --no-fund --prefer-offline=false

      - name: Bundle web app (esbuild)
        run: npm run bundle

      - name: Add Capacitor Android platform
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Customize Android (icons + landscape)
        run: npm run android:customize

      - name: Build APK debug
        working-directory: mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Locate APK
        id: locate
        working-directory: mobile/android
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "apk=$APK" >> "$GITHUB_OUTPUT"
          ls -la "$APK"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: five-scorer-debug-apk
          path: mobile/android/${{ steps.locate.outputs.apk }}
          if-no-files-found: error

      - name: Publish APK to a rolling Release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: mobile/android
        run: |
          set -euo pipefail
          TAG="apk-latest"
          REPO="${GITHUB_REPOSITORY}"
          # Renommage propre
          cp "${{ steps.locate.outputs.apk }}" "five-scorer.apk"

          # Delete prior release if exists (rolling release pattern)
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release delete "$TAG" --repo "$REPO" --yes --cleanup-tag
          fi

          gh release create "$TAG" \
            "five-scorer.apk" \
            --repo "$REPO" \
            --title "Five Scorer APK (latest)" \
            --notes "APK debug auto-buildé depuis main @ ${GITHUB_SHA::7}.

          📥 **Installation** : télécharge \`five-scorer.apk\` sur ton Android, ouvre-le dans le file manager / Chrome → Installer (autoriser l'installation depuis sources inconnues si demandé).

          🔐 PIN de lancement : **1234**
          ⚙️  Sync vers Supabase \`five-scorer\` activée."
